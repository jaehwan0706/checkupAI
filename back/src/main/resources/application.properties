spring.application.name=checkupai-backend
server.port=8081

# ===== 데이터베이스 =====
spring.datasource.url=jdbc:mysql://localhost:3306/checkupai?useSSL=false&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=checkupai
spring.datasource.password=checkupai1234!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.datasource.hikari.initialization-fail-timeout=0

# ===== 인코딩 =====
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.output.ansi.enabled=always

# ===== JWT =====
jwt.secret=checkupai-super-secret-key-for-jwt-authentication-256bits
jwt.expiration=86400000

# ===== 파일 업로드 (PDF) =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Claude API =====
claude.api.key=
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-6

